name: Release Deploy Package

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build deploy package
        run: npm run deploy:package

      - name: Collect release assets
        id: assets
        run: |
          set -euo pipefail
          asset_path="$(ls -1 build/fedresda-node-deploy-*.tar.gz | head -n 1)"
          cp "$asset_path" build/fedresda-node-deploy-latest.tar.gz
          echo "versioned_asset=$asset_path" >> "$GITHUB_OUTPUT"
          echo "latest_asset=build/fedresda-node-deploy-latest.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-build-${{ github.run_number }}
          name: Main build ${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: |
            ${{ steps.assets.outputs.versioned_asset }}
            ${{ steps.assets.outputs.latest_asset }}
