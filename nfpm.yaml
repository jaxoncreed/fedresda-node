name: "setmeld-pod"
arch: ${ARCH}
platform: "linux"
version: "0.0.1-alpha.4"
section: "utils"
priority: "optional"
maintainer: "SetMeld Team <jackson@setmeld.com>"
vendor: "SetMeld"
homepage: "https://setmeld.com"
license: "MIT"
description: |
  SetMeld Pod: Community Solid Server + Git over SSH (git-shell).

# We vendor Node, so no nodejs dependency.
depends:
  - openssh-server
  - git
  - curl
  - npm

contents:
  # app payload
  - src: ./package.json
    dst: /usr/lib/setmeld-pod/package.json
  - src: ./dist/
    dst: /usr/lib/setmeld-pod/dist
  - src: ./ui/dist-server/
    dst: /usr/lib/setmeld-pod/ui/dist-server
  - src: ./config/
    dst: /usr/lib/setmeld-pod/config
  - src: ./node_modules/
    dst: /usr/lib/setmeld-pod/node_modules
  - src: ./templates/
    dst: /usr/lib/setmeld-pod/templates

  # bundled Node runtime (unpacked official tarball for linux-x64)
  - src: ./vendor/node-runtime-${ARCH}/
    dst: /usr/lib/setmeld-pod/runtime
    expand: true

  # systemd units (your ExecStart should call /usr/bin/setmeld-pod)
  - src: ./scripts/debScripts/setmeld-pod-node.service
    dst: /lib/systemd/system/setmeld-pod-node.service
  - src: ./scripts/debScripts/setmeld-pod-git-sshd.service
    dst: /lib/systemd/system/setmeld-pod-git-sshd.service
  - src: ./scripts/debScripts/setmeld-pod.target
    dst: /lib/systemd/system/setmeld-pod.target

  # config dir
  - dst: /etc/setmeld-pod
    type: dir
    file_info: { mode: 0755 }

  # data dir (ownership set in postinstall after creating user)
  - dst: /var/lib/setmeld/data
    type: dir
    file_info: { mode: 0755 }

  # example env as config
  - src: ./scripts/debScripts/config.env.example
    dst: /etc/setmeld-pod/config.env
    type: config

overrides:
  deb:
    scripts:
      preinstall: ./scripts/debScripts/preinstall.sh
      postinstall: ./scripts/debScripts/postinstall.sh
      preremove: ./scripts/debScripts/preremove.sh
      postremove: ./scripts/debScripts/postremove.sh
