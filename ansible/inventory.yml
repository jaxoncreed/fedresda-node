all:
  hosts:
    myserver:
      ansible_host: your-server-ip-or-hostname
      ansible_user: your-username
      ansible_ssh_private_key_file: ~/.ssh/id_rsa
      base_url: yourdomain.com
      nginx_port: 80

  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_become: yes
    ansible_become_method: sudo
