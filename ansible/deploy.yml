---
- name: Deploy SetMeld Pod
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    triplestore_image: "setmeld-blazegraph"
    triplestore_container_port: 9999   # 2.1.6 RC jar listens on 9999, path /blazegraph/sparql
    triplestore_host_port: 8889
    triplestore_data_path: "/var/lib/setmeld/blazegraph"
    ssl_enabled: false
    ssl_cert_ready: false   # set true after Certbot when ssl_enabled

  tasks:
    - name: Set deployment variables
      set_fact:
        setmeld_pod_version: "0.0.1-alpha.4"
        setmeld_pod_architecture: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"

    - name: Set package name
      set_fact:
        setmeld_pod_package_name: "setmeld-pod_{{ setmeld_pod_version }}_{{ setmeld_pod_architecture }}.deb"

    - name: Display deployment info
      debug:
        msg: |
          Deploying SetMeld Pod:
          - Server: {{ inventory_hostname }}
          - Base URL: {{ base_url }}
          - Port: {{ nginx_port }}
          - Package: {{ setmeld_pod_package_name }}
          - Triplestore: Blazegraph (Docker)
          {% if ssl_enabled %} - SSL: Certbot (Let's Encrypt){% endif %}

    # Install packages
    - name: "→ Phase: apt cache (may be slow on small instances)"
      debug:
        msg: "Updating package cache..."

    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "→ Phase: Docker (apt install can take several minutes on low-RAM instances)"
      debug:
        msg: "Installing Docker and docker-compose..."

    - name: Install Docker
      apt:
        name:
          - docker.io
          - docker-compose
        state: present
      register: apt_docker_result

    - name: Show Docker apt install output on failure
      debug:
        var: apt_docker_result
      when: apt_docker_result is failed

    - name: Ensure Docker is started
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Copy SetMeld Pod package to server
      copy:
        src: "../bundle/{{ setmeld_pod_package_name }}"
        dest: "/tmp/{{ setmeld_pod_package_name }}"
        mode: '0644'

    - name: "→ Phase: SetMeld Pod .deb"
      debug:
        msg: "Installing SetMeld Pod package..."

    - name: Install SetMeld Pod package
      apt:
        deb: "/tmp/{{ setmeld_pod_package_name }}"
        state: present
        dpkg_options: 'force-confold,force-confdef'
      register: deb_install_result

    - name: Show dpkg/apt error output on failure
      debug:
        var: deb_install_result
      when: deb_install_result is failed

    - name: Clean up temporary package
      file:
        path: "/tmp/{{ setmeld_pod_package_name }}"
        state: absent

    # Run Blazegraph triplestore (2.1.6 RC - multi-arch, unified /blazegraph/sparql endpoint)
    - name: Ensure triplestore data directory exists
      file:
        path: "{{ triplestore_data_path }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure Blazegraph build directory exists
      file:
        path: /tmp/setmeld-blazegraph
        state: directory
        mode: '0755'

    - name: Copy Blazegraph Dockerfile to target
      copy:
        src: Dockerfile.blazegraph
        dest: /tmp/setmeld-blazegraph/Dockerfile
        mode: '0644'

    - name: Check if Blazegraph image exists
      command: docker images -q {{ triplestore_image }}
      register: blazegraph_image_check
      changed_when: false
      failed_when: false

    - name: "→ Phase: Blazegraph Docker image (can take 5–10 min and use a lot of RAM)"
      debug:
        msg: "Building Blazegraph image (skip if image already exists)..."
      when: blazegraph_image_check.stdout | length == 0

    - name: "Build Blazegraph Docker image (multi-arch: amd64/arm64)"
      command: docker build -t {{ triplestore_image }} .
      args:
        chdir: /tmp/setmeld-blazegraph
      when: blazegraph_image_check.stdout | length == 0
      register: docker_build_result

    - name: Show Docker build output on failure
      debug:
        msg: "{{ (docker_build_result.stdout_lines | default([])) + (docker_build_result.stderr_lines | default([])) }}"
      when: docker_build_result is defined and docker_build_result is failed

    - name: Check if Blazegraph container exists
      command: docker inspect --type container setmeld-blazegraph
      register: blazegraph_exists
      ignore_errors: yes
      changed_when: false

    - name: Create and start Blazegraph container
      command: >
        docker run -d
        --name setmeld-blazegraph
        --restart unless-stopped
        -p 127.0.0.1:{{ triplestore_host_port }}:{{ triplestore_container_port }}
        -v {{ triplestore_data_path }}:/data
        {{ triplestore_image }}
      when: blazegraph_exists.rc != 0

    - name: Start existing Blazegraph container
      command: docker start setmeld-blazegraph
      when: blazegraph_exists.rc == 0

    - name: Install nginx
      apt:
        name: nginx
        state: present

    # Configure nginx
    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    # If a Let's Encrypt cert already exists (e.g. re-run or previous --ssl), enable HTTPS in nginx
    - name: Check if Let's Encrypt cert already exists for base_url
      stat:
        path: "/etc/letsencrypt/live/{{ base_url }}/fullchain.pem"
      register: le_cert_exists

    - name: Set ssl_cert_ready when cert already exists
      set_fact:
        ssl_cert_ready: true
      when: le_cert_exists.stat.exists | default(false)

    - name: Configure nginx for SetMeld Pod
      template:
        src: nginx-setmeld-pod.j2
        dest: /etc/nginx/sites-available/setmeld-pod
        owner: root
        group: root
        mode: '0644'

    - name: Enable SetMeld Pod nginx site
      file:
        src: /etc/nginx/sites-available/setmeld-pod
        dest: /etc/nginx/sites-enabled/setmeld-pod
        state: link

    - name: Restart nginx to apply configuration
      systemd:
        name: nginx
        state: restarted

    # SSL: obtain certificate then enable HTTPS in nginx
    - name: Install Certbot (for --ssl)
      apt:
        name: certbot
        state: present
      when: ssl_enabled | default(false)

    - name: Ensure ACME challenge directory exists
      file:
        path: /var/lib/letsencrypt/acme
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: ssl_enabled | default(false)

    - name: Obtain Let's Encrypt certificate (HTTP-01)
      command: >
        certbot certonly --webroot
        -w /var/lib/letsencrypt/acme
        -d {{ base_url }}
        --email {{ ssl_email }}
        --non-interactive --agree-tos
      when: ssl_enabled | default(false)
      register: certbot_result

    - name: Set ssl_cert_ready after successful cert
      set_fact:
        ssl_cert_ready: true
      when: ssl_enabled | default(false) and certbot_result is succeeded

    - name: Re-configure nginx with SSL (HTTPS + HTTP redirect)
      template:
        src: nginx-setmeld-pod.j2
        dest: /etc/nginx/sites-available/setmeld-pod
        owner: root
        group: root
        mode: '0644'
      when: ssl_cert_ready | default(false)

    - name: Restart nginx to apply SSL configuration
      systemd:
        name: nginx
        state: restarted
      when: ssl_cert_ready | default(false)

    - name: Ensure nginx log directory exists
      file:
        path: /var/log/nginx
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    # Update SetMeld Pod configuration
    - name: Update CSS_BASE_URL in config.env
      lineinfile:
        path: /etc/setmeld-pod/config.env
        regexp: '^CSS_BASE_URL='
        line: >-
          CSS_BASE_URL={% if ssl_enabled | default(false) %}https://{{ base_url }}/{% else %}http://{{ base_url }}{{ ":" ~ nginx_port if nginx_port != 80 else "" }}/{% endif %}
        state: present
        backup: yes

    - name: Update CSS_SPARQL_ENDPOINT in config.env
      lineinfile:
        path: /etc/setmeld-pod/config.env
        regexp: '^CSS_SPARQL_ENDPOINT='
        line: 'CSS_SPARQL_ENDPOINT=http://127.0.0.1:{{ triplestore_host_port }}/blazegraph/sparql'
        state: present
        backup: yes

    # Restart SetMeld Pod service to apply configuration changes
    - name: Restart SetMeld Pod service
      systemd:
        name: setmeld-pod.target
        state: restarted
        daemon_reload: yes

    # Start and enable services
    - name: Start and enable services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
        daemon_reload: yes
      loop:
        - setmeld-pod.target
        - nginx

    # Verify deployment (Blazegraph 90s; pod can take 3–5 min on small instances)
    - name: "→ Phase: Waiting for services (nginx, pod, Blazegraph)"
      debug:
        msg: "Checking that ports are open (pod up to 5 min – CSS component loading is slow)..."

    - name: Wait for services to be ready
      block:
        - name: Wait for ports
          wait_for:
            port: "{{ item.port }}"
            host: 127.0.0.1
            delay: 5
            timeout: "{{ item.timeout | default(60) }}"
          loop:
            - { port: "{{ nginx_port }}", timeout: 60 }
            - { port: "3000", timeout: 300 }   # SetMeld Pod (CSS discovery + loading often 3+ min)
            - { port: "{{ triplestore_host_port }}", timeout: 90 }   # Blazegraph (Java)
        - name: Wait for HTTPS port when SSL enabled
          wait_for:
            port: 443
            host: 127.0.0.1
            delay: 5
            timeout: 30
          when: ssl_enabled | default(false)
      rescue:
        - name: Show SetMeld Pod service status when wait failed
          command: systemctl status setmeld-pod-node.service
          register: pod_status
          ignore_errors: yes
        - name: Display pod status
          debug:
            var: pod_status.stdout_lines
          when: pod_status.stdout_lines is defined
        - name: Show recent SetMeld Pod logs
          command: journalctl -u setmeld-pod-node.service -n 80 --no-pager
          register: pod_logs
          ignore_errors: yes
        - name: Display pod logs
          debug:
            msg: "{{ pod_logs.stdout_lines | default(pod_logs.stdout) }}"
          when: pod_logs.stdout is defined
        - name: Fail with clear message
          fail:
            msg: "One or more services did not become ready (often port 3000). Check pod status/logs above. On low-RAM instances, increase swap or retry after a few minutes."
          when: true

    - name: Display success message
      debug:
        msg: |
          SetMeld Pod deployment completed successfully!
          {% if ssl_enabled | default(false) %}
          Web interface: https://{{ base_url }}/
          {% else %}
          Web interface: http://{{ base_url }}{{ ":" ~ nginx_port if nginx_port != 80 else "" }}/
          {% endif %}
