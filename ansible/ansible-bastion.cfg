# Use OVH the-bastion-ansible-wrapper for ULiège inventory (ProxyJump via bastion).
# Load this only when running with inventory-uliege.yml (deploy.sh sets ANSIBLE_CONFIG).
[ssh_connection]
pipelining = True
ssh_executable = ./the-bastion-ansible-wrapper/sshwrapper.py
sftp_executable = ./the-bastion-ansible-wrapper/sftpbastion.sh
scp_executable = ./the-bastion-ansible-wrapper/scpbastion.sh
transfer_method = sftp
