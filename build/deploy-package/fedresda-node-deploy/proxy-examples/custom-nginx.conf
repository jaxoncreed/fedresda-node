# Example Nginx configuration for use with your own reverse proxy.
# Use this when you disable the bundled nginx container and put SetMeld Pod
# behind an existing proxy (e.g. corporate F5, nginx, or Traefik).
#
# 1. Replace upstream address/port if your app is not on 127.0.0.1:3000.
# 2. Set server_name to your hostname.
# 3. Ensure TRUST_PROXY=true in the application .env so X-Forwarded-* are trusted.

upstream setmeld_pod {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name pod.mycompany.internal;

    location / {
        proxy_pass http://setmeld_pod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}

