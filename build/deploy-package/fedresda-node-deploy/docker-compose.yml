# SetMeld Pod — Compose runtime for deploy.sh
# Do not edit manually for normal use; edit config.env and run ./deploy.sh up.

services:
  node-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: setmeld-pod-node:latest
    restart: unless-stopped
    env_file:
      - .env.generated
    environment:
      - TRUST_PROXY=${TRUST_PROXY}
      - TRIPLESTORE_URL=${TRIPLESTORE_URL}
      - BASE_URL=${BASE_URL}
    volumes:
      - ${HOST_DATA_DIR}:/app/data
    ports:
      - "${NODE_HOST_BIND}:${NODE_HOST_PORT}:3000"

  triplestore:
    build:
      context: .
      dockerfile: Dockerfile.triplestore
    image: setmeld-pod-triplestore:latest
    restart: unless-stopped
    profiles:
      - bundled-triplestore
    volumes:
      - triplestore-data:/var/blazegraph
    ports:
      - "127.0.0.1:${TRIPLESTORE_HOST_PORT}:9999"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    profiles:
      - bundled-nginx
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./nginx/generated/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot-www:/var/www/certbot:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/runtime-certs:/etc/nginx/runtime-certs:ro
    depends_on:
      - node-app

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/certbot-www:/var/www/certbot

volumes:
  triplestore-data:
